name: Live Continuous Poller

# Poll live contínuo, disparado pelo cron-job.org a cada 4h (runs de
# 5.5h). O loop corre INTEIRAMENTE no runner (scripts/poll-live.ts) e
# escreve direto no Supabase — já NÃO bate em Vercel functions. Isto
# porque o loop antigo (curl para /api/cron/*) queimava ~60h/mês de
# Fluid Active CPU num plano Hobby com 4h de limite → 402 DEPLOYMENT
# DISABLED. Runner GHA é grátis/ilimitado em repos públicos.
#
# Usa os secrets já existentes: SUPABASE_URL, SUPABASE_SERVICE_KEY,
# CRON_SECRET (mapeados para os nomes de env que os libs esperam).

on:
  # Trigger primário: cron-job.org faz POST à API do GH a cada 4h
  # (0 */4 * * * timezone Europe/Lisbon) → ~1h30 de sobreposição entre
  # janelas de 5.5h. Fonte externa é mais fiável que o scheduler do GH
  # Actions, que dropa runs silenciosamente em repos com baixo tráfego.
  #
  # workflow_dispatch continua disponível para trigger manual (via UI ou
  # gh workflow run) quando quisermos forçar imediato.
  workflow_dispatch:

# Só 1 run de cada vez — o cron-job.org dispara a cada 4h mas as runs
# duram 5.5h, o que criava 1.5h de sobreposição = 2× o consumo Vercel
# nesse período. cancel-in-progress mata a run antiga quando a nova
# arranca, garantindo zero overlap.
concurrency:
  group: live-continuous
  cancel-in-progress: true

jobs:
  poll:
    name: Continuous 30s loop
    runs-on: ubuntu-latest
    timeout-minutes: 340   # 5h40min — abaixo do limite 6h da GHA

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ runner.os }}-v1

      - name: Install Playwright + chromium
        run: |
          npm install --no-save playwright@1.49.0
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install-deps chromium || true
          fi

      - name: Poll loop no runner (escrita direta ao Supabase, zero Vercel)
        env:
          # O poll corre NO RUNNER e escreve direto no Supabase — não
          # bate em Vercel functions (que consumiam ~60h/mês de Fluid
          # Active CPU num plano com 4h de limite). Precisa das creds
          # Supabase como env; o URL não é secreto (está no client).
          # Mapeia os secrets existentes (SUPABASE_URL / SUPABASE_SERVICE_KEY)
          # para os nomes de env var que os libs @/lib/supabase esperam.
          NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
          # O @/lib/supabase cria um cliente anon de topo ao importar —
          # precisa da anon key mesmo que o poll só use o service role.
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.SUPABASE_SERVICE_KEY }}"
          CRON_SECRET: "${{ secrets.CRON_SECRET }}"
          POLL_RUNTIME_MS: "19800000"   # 5h30min
          POLL_INTERVAL_MS: "30000"     # 30s por ciclo
        run: |
          npx tsx scripts/poll-live.ts
