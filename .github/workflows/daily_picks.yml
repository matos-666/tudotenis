name: Daily Picks Generator

on:
  schedule:
    # 06:00 UTC = 08:00 Lisboa em DST (Mar-Out) · 07:00 Lisboa em winter time.
    # User pediu "às 8:00 da manhã de Lisboa" — alinha em DST que é o
    # período mais activo do calendário ATP/WTA. Em winter (Nov-Mar) dispara
    # às 07:00 Lisboa, o que ainda é razoável.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  trigger:
    name: Trigger picks via Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call /api/cron/picks
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "https://tudotenis.vercel.app/api/cron/picks" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")

          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Failed with status $HTTP_STATUS"
            exit 1
          fi

          echo "✅ Picks generated successfully"
