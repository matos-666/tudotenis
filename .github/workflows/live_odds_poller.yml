name: Live Odds Poller

# Corre em paralelo ao live_state_poller para capturar odds The Odds API
# (OddsAPI v4) em sincronia com snapshots de live_state.
#
# Cobertura: 2 calls OA por execução (atp_wimbledon + wta_wimbledon).
# 12 execuções/h × 2 = 24/h × 24h = 576/dia. Plano Pro do OddsAPI cobre.

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  poll:
    name: Poll live-odds
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Loop 10× 30s = 5min
        run: |
          ENDPOINT="https://tudotenis.com/api/cron/live-odds"
          ITERATIONS=10
          INTERVAL_S=30
          OK=0
          FAIL=0

          for i in $(seq 1 $ITERATIONS); do
            ts=$(date +%H:%M:%S)
            response=$(curl -sS -w "\nHTTP:%{http_code}" \
              -X POST "$ENDPOINT" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              --max-time 15)
            code=$(echo "$response" | grep "HTTP:" | cut -d: -f2)
            body=$(echo "$response" | grep -v "HTTP:")
            echo "[$ts] iter=$i HTTP=$code → $body"
            if [ "$code" = "200" ]; then OK=$((OK+1)); else FAIL=$((FAIL+1)); fi
            if [ $i -lt $ITERATIONS ]; then sleep $INTERVAL_S; fi
          done

          echo ""
          echo "═══ Summary ═══"
          echo "OK:   $OK / $ITERATIONS"
          echo "FAIL: $FAIL / $ITERATIONS"
          if [ $OK -eq 0 ]; then exit 1; fi
