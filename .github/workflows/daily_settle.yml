name: Frequent Settlement (2h cadence)

# Settle picks de 2 em 2 horas para feedback rápido.
# O Vercel Cron (22:30 UTC) continua a correr como fallback diário.
#
# Janela ATP/WTA típica: ~07:00–24:00 UTC. As 12 execuções/dia (a cada 2h)
# cobrem isso e ainda margem. Pessoas em PT/BR vêem resultados a aparecer
# em ~2h após o final dos jogos.

on:
  schedule:
    # Cada 2 horas, ao 0 minuto: 00:00, 02:00, ... 22:00 UTC
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  settle:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call /api/cron/settle
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "https://tudotenis.vercel.app/api/cron/settle" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Status: $STATUS"
          echo "Response: $BODY"
          [ "$STATUS" = "200" ] || exit 1
