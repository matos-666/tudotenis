name: Twin Live Odds Scraper

# Scrape odds Twin live tennis via Playwright headless e POSTa para
# /api/cron/live-odds-ingest no Vercel. Repo público → GHA minutes
# ilimitados, sem custos.
#
# Estratégia anti-staleness:
#   - DUAS cron schedules em offset → dobra a chance de GHA disparar
#     um workflow num intervalo curto (GHA throttla scheduled crons).
#   - LOOP INTERNO de 6 scrapes × 40s dentro de cada run → quando
#     a workflow corre de facto, despeja 6 snapshots em ~4min,
#     mantendo odds frescas mesmo se próxima cron atrasar.
#   - Resultado: gap máximo entre snapshots cai de 1-4h para <30min
#     no pior caso, e tipicamente <1min em condições normais.

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"       # 0, 5, 10, 15, ...
    - cron: "2-59/5 * * * *"    # 2, 7, 12, 17, ... (offset 2min)

jobs:
  scrape:
    name: Twin scrape loop
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-chromium-${{ runner.os }}-v1

      - name: Install Playwright + chromium
        run: |
          npm install --no-save playwright@1.49.0
          if [ "${{ steps.pw-cache.outputs.cache-hit }}" != "true" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install-deps chromium || true
          fi

      - name: Scrape + POST loop (6 iterações × 40s = ~4min coverage)
        run: |
          ENDPOINT="https://tudotenis.com/api/cron/live-odds-ingest"
          ITERATIONS=6
          INTERVAL_S=40
          OK=0
          FAIL=0

          for i in $(seq 1 $ITERATIONS); do
            ts=$(date +%H:%M:%S)
            node scripts/scrape-twin-live.mjs > /tmp/twin.json 2>/dev/null
            size=$(wc -c < /tmp/twin.json)
            response=$(curl -sS -w "\nHTTP:%{http_code}" \
              -X POST "$ENDPOINT" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              -H "Content-Type: application/json" \
              --data-binary @/tmp/twin.json \
              --max-time 30 2>/dev/null)
            code=$(echo "$response" | grep "HTTP:" | cut -d: -f2)
            body=$(echo "$response" | grep -v "HTTP:")
            echo "[$ts] iter=$i size=${size}B HTTP=$code → $body"
            if [ "$code" = "200" ]; then OK=$((OK+1)); else FAIL=$((FAIL+1)); fi
            if [ $i -lt $ITERATIONS ]; then sleep $INTERVAL_S; fi
          done

          echo ""
          echo "═══ Summary ═══"
          echo "OK:   $OK / $ITERATIONS"
          echo "FAIL: $FAIL / $ITERATIONS"
          if [ $OK -eq 0 ]; then exit 1; fi

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: twin-debug-${{ github.run_id }}
          path: /tmp/twin-*.{html,png,json}
          if-no-files-found: ignore
          retention-days: 3
